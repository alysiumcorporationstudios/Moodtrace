<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MoodTrace — Daily Emotional Check-in</title>
<meta name="description" content="Track and understand your emotional patterns day to day with gentle daily check-ins." />
<style>
/* MoodTrace — warm, calm, non-clinical design system */
:root {
  --bg: #faf6f1;
  --surface: #ffffff;
  --surface-2: #f4ede4;
  --ink: #3a3630;
  --ink-soft: #7a726a;
  --primary: #b8956a;
  --primary-ink: #ffffff;
  --accent: #a8b89a;
  --accent-2: #d9c6a8;
  --lavender: #c9bcd6;
  --border: #ece4d8;
  --up: #a8b89a;
  --down: #c9bcd6;
  --same: #d4cec4;
  --nudge: #f0e6d2;
  --shadow: 0 4px 20px rgba(80, 60, 40, 0.06);
  --radius: 18px;
  --radius-sm: 12px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 88px; }
.app-header { padding: 24px 20px 12px; display: flex; align-items: center; justify-content: space-between; }
.app-header h1 { font-size: 22px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
.app-header .subtle { font-size: 13px; color: var(--ink-soft); }
.tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); z-index: 10; }
.tabbar-inner { max-width: 480px; width: 100%; margin: 0 auto; display: flex; justify-content: space-around; }
.tab { background: none; border: 0; cursor: pointer; color: var(--ink-soft); font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 10px; border-radius: 10px; }
.tab.active { color: var(--primary); }
.tab-icon { font-size: 20px; }
.card { background: var(--surface); border-radius: var(--radius); padding: 20px; margin: 12px 20px; box-shadow: var(--shadow); }
.card h2 { margin: 0 0 12px; font-size: 17px; font-weight: 600; }
.card p { margin: 0 0 8px; color: var(--ink-soft); font-size: 14px; }
.card .question { font-size: 16px; color: var(--ink); font-weight: 500; }
.banner { margin: 12px 20px; padding: 14px 16px; border-radius: var(--radius-sm); font-size: 14px; background: var(--nudge); color: #6b5a3f; }
.banner.supportive { background: #eae4f0; color: #52466a; }
.mood-row { display: flex; justify-content: space-between; gap: 6px; margin-top: 12px; }
.mood-btn { flex: 1; background: var(--surface-2); border: 2px solid transparent; border-radius: 14px; padding: 12px 0; font-size: 26px; cursor: pointer; transition: transform .15s, border-color .15s; }
.mood-btn:hover { transform: translateY(-2px); }
.mood-btn.selected { border-color: var(--primary); background: #fff; }
.slider-group { margin-top: 16px; }
.slider-label { display: flex; justify-content: space-between; align-items: baseline; font-size: 14px; margin-bottom: 6px; }
.slider-label .val { color: var(--primary); font-weight: 600; }
.slider-hint { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }
input[type=range] { width: 100%; -webkit-appearance: none; height: 6px; background: var(--surface-2); border-radius: 3px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--primary); cursor: pointer; border: 3px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
input[type=range]::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: var(--primary); cursor: pointer; border: 3px solid #fff; }
textarea { width: 100%; min-height: 72px; border-radius: 12px; border: 1px solid var(--border); padding: 10px 12px; font: inherit; resize: vertical; background: #fdfbf7; color: var(--ink); }
textarea:focus { outline: 2px solid var(--accent-2); border-color: transparent; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; background: var(--primary); color: var(--primary-ink); border: 0; padding: 12px 20px; font: inherit; font-weight: 600; border-radius: 12px; cursor: pointer; width: 100%; margin-top: 16px; transition: opacity .15s, transform .1s; }
.btn:hover { opacity: 0.92; }
.btn:active { transform: scale(0.98); }
.btn.secondary { background: var(--surface-2); color: var(--ink); }
.btn.ghost { background: transparent; color: var(--primary); }
.deltas { display: flex; gap: 10px; margin-top: 14px; }
.delta { flex: 1; background: var(--surface-2); border-radius: 12px; padding: 12px; text-align: center; }
.delta .label { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; }
.delta .value { font-size: 20px; font-weight: 600; margin-top: 4px; }
.delta.up .value { color: var(--up); }
.delta.down .value { color: var(--down); }
.delta.same .value { color: var(--same); }
.delta-text { font-size: 14px; color: var(--ink-soft); margin-top: 12px; text-align: center; }
.history-item { background: var(--surface); border-radius: var(--radius-sm); padding: 14px 16px; margin: 8px 20px; cursor: pointer; box-shadow: var(--shadow); }
.history-row { display: flex; align-items: center; gap: 12px; }
.history-emoji { font-size: 26px; }
.history-date { font-weight: 600; font-size: 14px; }
.history-scores { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.history-detail { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 14px; color: var(--ink-soft); }
.history-detail .q { font-style: italic; margin-bottom: 6px; }
.chart-wrap { padding: 0 4px; }
.chart-title { font-size: 13px; color: var(--ink-soft); margin-bottom: 4px; }
svg.chart { width: 100%; height: 90px; display: block; }
.chart-range { display: flex; gap: 8px; margin: 12px 20px; }
.chart-range button { flex: 1; padding: 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font: inherit; font-size: 13px; }
.chart-range button.active { background: var(--primary); color: white; border-color: var(--primary); }
.setting-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
.setting-row:last-child { border-bottom: 0; }
.setting-row label { font-size: 14px; }
input[type=time] { border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font: inherit; background: #fff; }
.muted { color: var(--ink-soft); font-size: 12px; }
.center { text-align: center; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--accent-2); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.summary-scores { display: flex; gap: 16px; margin-top: 8px; }
.summary-scores > div { flex: 1; }
.summary-scores .k { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; }
.summary-scores .v { font-size: 22px; font-weight: 600; }
#app-fallback { max-width: 480px; margin: 40px auto; padding: 20px; font-family: sans-serif; color: #6b5a3f; }
</style>
</head>
<body>
  <div id="app">
    <div id="app-fallback">Loading MoodTrace… if this message stays, check your internet connection (this app loads React from a CDN).</div>
  </div>

  <!-- React (production) via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="env,react">
/* ================== kypeClient (inlined) ================== */
const NEURAPROMPT_API_URL =
  (typeof window !== "undefined" && window.NEURAPROMPT_API_URL) ||
  "https://neura-prompt-ai.vercel.app/api/kype";
const NEURAPROMPT_API_KEY =
  (typeof window !== "undefined" && window.NEURAPROMPT_API_KEY) || "";

const FALLBACK_QUESTIONS = [
  "What is one small thing that felt good today, even briefly?",
  "How rested did you feel when you woke up this morning?",
  "What kind of energy have you been carrying today?",
  "Was there a moment today when you noticed your mood shift?",
  "Who or what has been on your mind lately?",
  "How gentle have you been with yourself today?",
  "What would feel supportive to you right now?",
  "Is there anything you're looking forward to, big or small?",
  "How does your body feel at this moment?",
  "What emotions have been closest to the surface today?",
  "Have you had space to breathe today?",
  "What has your inner voice been saying today?",
  "Is there something you want to let go of before tomorrow?",
  "When did you last feel truly present today?",
  "What would you tell a friend feeling the way you feel now?",
];

function pickFallbackQuestion(seed) {
  const s = String(seed || new Date().toISOString().slice(0, 10));
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return FALLBACK_QUESTIONS[h % FALLBACK_QUESTIONS.length];
}

async function callKype(prompt, context) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 8000);
  try {
    const res = await fetch(NEURAPROMPT_API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${NEURAPROMPT_API_KEY}`,
      },
      body: JSON.stringify({ prompt, context }),
      signal: controller.signal,
    });
    if (!res.ok) throw new Error(`Kype HTTP ${res.status}`);

    const contentType = res.headers.get("content-type") || "";

    if (contentType.includes("text/event-stream") && res.body) {
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let text = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        chunk.split("\n").forEach((line) => {
          const m = line.match(/^data:\s?(.*)$/);
          if (m && m[1] && m[1] !== "[DONE]") {
            try {
              const parsed = JSON.parse(m[1]);
              text += parsed.text || parsed.content || parsed.delta || "";
            } catch {
              text += m[1];
            }
          }
        });
      }
      return text.trim();
    }

    const data = await res.json();
    return (data.text || data.content || data.message || "").trim();
  } finally {
    clearTimeout(timeout);
  }
}

window.kypeClient = {
  async getDailyQuestion(dateISO) {
    try {
      const text = await callKype(
        "Generate one short, warm, non-clinical daily emotional check-in question.",
        { date: dateISO, kind: "daily_question" }
      );
      if (text && text.length > 4) return { text, source: "kype" };
      throw new Error("empty response");
    } catch (e) {
      return { text: pickFallbackQuestion(dateISO), source: "fallback" };
    }
  },

  async getInsight(recentEntries) {
    try {
      const text = await callKype(
        "Given the user's recent mood/anxiety/self-awareness scores, write 1-2 warm, supportive, non-diagnostic sentences reflecting the trend.",
        { kind: "daily_insight", entries: recentEntries }
      );
      if (text) return { text, source: "kype" };
      throw new Error("empty response");
    } catch (e) {
      if (!recentEntries || recentEntries.length === 0) {
        return { text: "Welcome. Checking in with yourself is a kind first step.", source: "fallback" };
      }
      const last = recentEntries[recentEntries.length - 1];
      const avgMood = recentEntries.reduce((s, e) => s + (e.mood || 0), 0) / recentEntries.length;
      let msg;
      if (last.mood >= 4) msg = "You've been carrying some brightness lately — nice to see.";
      else if (last.mood <= 2) msg = "It sounds like today's been a heavier one. Be gentle with yourself.";
      else if (avgMood >= 3.5) msg = "Your recent days have felt fairly steady.";
      else msg = "There's been some ups and downs — that's part of being human.";
      return { text: msg, source: "fallback" };
    }
  },
};

/* ================== App (inlined) ================== */
const { useState, useEffect, useMemo } = React;

function toLocalISODate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function todayISO() { return toLocalISODate(new Date()); }
function daysAgoISO(n) {
  const d = new Date(); d.setDate(d.getDate() - n); return toLocalISODate(d);
}
function prettyDate(iso) {
  const [y,m,d] = iso.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}

const MOOD_EMOJIS = ["😞","😕","😐","🙂","😊"];

function App() {
  const [entries, setEntries] = useState({});
  const [tab, setTab] = useState("home");
  const [reminderTime, setReminderTime] = useState("20:00");
  const [notifPermission, setNotifPermission] = useState(
    typeof Notification !== "undefined" ? Notification.permission : "default"
  );

  useEffect(() => {
    const seed = {};
    const rand = (min,max) => Math.round(min + Math.random()*(max-min));
    for (let i = 5; i >= 1; i--) {
      const iso = daysAgoISO(i);
      seed[iso] = { date: iso, mood: rand(2,4), anxiety: rand(2,6), depression: rand(1,5), note: "", question: "How are you feeling today?" };
    }
    setEntries(seed);
  }, []);

  const today = todayISO();
  const yesterday = daysAgoISO(1);
  const todayEntry = entries[today];
  const yesterdayEntry = entries[yesterday];

  const hasAnyBeforeYesterday = Object.keys(entries).some(d => d < yesterday);
  const missedYesterday = !yesterdayEntry && hasAnyBeforeYesterday;

  function saveEntry(e) { setEntries(prev => ({ ...prev, [e.date]: e })); }

  function requestNotif() {
    if (typeof Notification === "undefined") { alert("Notifications not supported in this browser."); return; }
    Notification.requestPermission().then(p => setNotifPermission(p));
  }

  useEffect(() => {
    if (notifPermission !== "granted") return;
    const t = setInterval(() => {
      const now = new Date();
      const [h,m] = reminderTime.split(":").map(Number);
      if (now.getHours() === h && now.getMinutes() === m && !entries[todayISO()]) {
        try { new Notification("MoodTrace", { body: "Time for your check-in 💛" }); } catch {}
      }
    }, 60000);
    return () => clearInterval(t);
  }, [notifPermission, reminderTime, entries]);

  return (
    <>
      <header className="app-header">
        <div>
          <h1>MoodTrace</h1>
          <div className="subtle">{prettyDate(today)}</div>
        </div>
      </header>

      {tab === "home" && (
        <HomeTab today={today} yesterday={yesterday} todayEntry={todayEntry} yesterdayEntry={yesterdayEntry}
          entries={entries} missedYesterday={missedYesterday} onSave={saveEntry} />
      )}
      {tab === "history" && <HistoryTab entries={entries} />}
      {tab === "insights" && <InsightsTab entries={entries} />}
      {tab === "settings" && (
        <SettingsTab reminderTime={reminderTime} setReminderTime={setReminderTime}
          notifPermission={notifPermission} onRequestNotif={requestNotif} entries={entries} />
      )}

      <nav className="tabbar">
        <div className="tabbar-inner">
          {[["home","Home","🏠"],["history","History","📖"],["insights","Insights","📈"],["settings","Settings","⚙️"]].map(([id,label,icon]) => (
            <button key={id} className={"tab " + (tab===id?"active":"")} onClick={()=>setTab(id)}>
              <span className="tab-icon">{icon}</span>{label}
            </button>
          ))}
        </div>
      </nav>
    </>
  );
}

function HomeTab({ today, todayEntry, yesterdayEntry, entries, missedYesterday, onSave }) {
  const [editing, setEditing] = useState(false);
  const showCheckIn = !todayEntry || editing;

  const supportiveBanner = useMemo(() => {
    const days = [];
    for (let i = 0; i < 3; i++) days.push(daysAgoISO(i));
    return days.every(d => { const e = entries[d]; return e && (e.anxiety >= 7 || e.depression >= 7); });
  }, [entries]);

  return (
    <>
      {supportiveBanner && (
        <div className="banner supportive">
          You've been carrying some heavier feelings for a few days. It might help to talk with someone you trust —
          a friend, family member, or a mental-health professional. This is a moment of care, not a diagnosis.
          {" "}<a href="https://findahelpline.com/" target="_blank" rel="noreferrer">Find support →</a>
        </div>
      )}
      {missedYesterday && !supportiveBanner && (
        <div className="banner">No check-in yesterday — that's okay. Today is a fresh page. 🌱</div>
      )}

      {showCheckIn ? (
        <CheckInCard today={today} existing={todayEntry} onSave={(e)=>{ onSave(e); setEditing(false); }} onCancel={()=>setEditing(false)} />
      ) : (
        <TodaySummaryCard entry={todayEntry} onEdit={()=>setEditing(true)} />
      )}

      <ComparisonCard today={todayEntry} yesterday={yesterdayEntry} />
      <InsightCard entries={entries} />
    </>
  );
}

function CheckInCard({ today, existing, onSave, onCancel }) {
  const [question, setQuestion] = useState(existing?.question || "");
  const [loadingQ, setLoadingQ] = useState(!existing);
  const [mood, setMood] = useState(existing?.mood ?? 3);
  const [anxiety, setAnxiety] = useState(existing?.anxiety ?? 3);
  const [depression, setDepression] = useState(existing?.depression ?? 3);
  const [note, setNote] = useState(existing?.note ?? "");

  useEffect(() => {
    if (existing) return;
    let cancelled = false;
    window.kypeClient.getDailyQuestion(today).then(r => { if (!cancelled) { setQuestion(r.text); setLoadingQ(false); } });
    return () => { cancelled = true; };
  }, [today, existing]);

  return (
    <div className="card">
      <h2>Today's check-in</h2>
      <div className="question">
        {loadingQ ? <><span className="spinner"/> Loading today's question…</> : question}
      </div>

      <div className="slider-group">
        <div className="slider-label"><span>Overall mood</span></div>
        <div className="mood-row">
          {MOOD_EMOJIS.map((emo,i) => (
            <button key={i} className={"mood-btn " + (mood===i+1?"selected":"")} onClick={()=>setMood(i+1)} aria-label={`Mood ${i+1}`}>{emo}</button>
          ))}
        </div>
      </div>

      <div className="slider-group">
        <div className="slider-label"><span>Anxiety level</span><span className="val">{anxiety}</span></div>
        <input type="range" min="0" max="10" value={anxiety} onChange={e=>setAnxiety(+e.target.value)} />
        <div className="slider-hint">0 = very calm · 10 = very anxious</div>
      </div>

      <div className="slider-group">
        <div className="slider-label"><span>Low mood / energy / interest</span><span className="val">{depression}</span></div>
        <input type="range" min="0" max="10" value={depression} onChange={e=>setDepression(+e.target.value)} />
        <div className="slider-hint">A self-awareness score — not a diagnosis.</div>
      </div>

      <div className="slider-group">
        <div className="slider-label"><span>A short note (optional)</span><span className="val">{note.length}/280</span></div>
        <textarea maxLength={280} value={note} onChange={e=>setNote(e.target.value.slice(0,280))} placeholder="Anything you want to remember about today…" />
      </div>

      <button className="btn" onClick={()=>onSave({ date: today, mood, anxiety, depression, note, question })}>
        {existing ? "Update today's entry" : "Save today's check-in"}
      </button>
      {existing && <button className="btn secondary" onClick={onCancel}>Cancel</button>}
    </div>
  );
}

function TodaySummaryCard({ entry, onEdit }) {
  return (
    <div className="card">
      <h2>You've checked in today ✓</h2>
      <p className="question">{entry.question}</p>
      <div className="summary-scores">
        <div><div className="k">Mood</div><div className="v">{MOOD_EMOJIS[entry.mood-1]}</div></div>
        <div><div className="k">Anxiety</div><div className="v">{entry.anxiety}<span className="muted">/10</span></div></div>
        <div><div className="k">Low-mood</div><div className="v">{entry.depression}<span className="muted">/10</span></div></div>
      </div>
      {entry.note && <p style={{marginTop:12}}>"{entry.note}"</p>}
      <button className="btn ghost" onClick={onEdit}>Edit today's entry</button>
      <div className="muted center" style={{marginTop:4}}>You can edit until midnight.</div>
    </div>
  );
}

function deltaInfo(todayVal, yestVal, invert=false) {
  if (todayVal == null || yestVal == null) return { dir: "same", arrow: "–", diff: 0 };
  const diff = todayVal - yestVal;
  if (diff === 0) return { dir: "same", arrow: "→", diff: 0 };
  const isPositive = invert ? diff < 0 : diff > 0;
  return { dir: isPositive ? "up" : "down", arrow: diff > 0 ? "↑" : "↓", diff };
}

function ComparisonCard({ today, yesterday }) {
  if (!today || !yesterday) {
    return (
      <div className="card">
        <h2>Today vs Yesterday</h2>
        <p>{!today ? "Check in today to see how it compares." : "No entry yesterday to compare against."}</p>
      </div>
    );
  }
  const mood = deltaInfo(today.mood, yesterday.mood, false);
  const anx  = deltaInfo(today.anxiety, yesterday.anxiety, true);
  const dep  = deltaInfo(today.depression, yesterday.depression, true);

  const phrases = [];
  if (mood.diff !== 0)  phrases.push(mood.diff > 0 ? "your mood is a bit brighter than yesterday" : "your mood feels a little heavier than yesterday");
  if (anx.diff !== 0)   phrases.push(anx.diff < 0 ? "your anxiety is a bit lower than yesterday" : "your anxiety is a bit higher than yesterday");
  if (dep.diff !== 0)   phrases.push(dep.diff < 0 ? "your energy/interest feels a bit better than yesterday" : "you're feeling a little lower than yesterday");
  const summary = phrases.length ? "Today, " + phrases.join("; ") + "." : "Today feels much like yesterday — steady ground.";

  return (
    <div className="card">
      <h2>Today vs Yesterday</h2>
      <div className="deltas">
        <div className={"delta " + mood.dir}><div className="label">Mood</div><div className="value">{mood.arrow}</div></div>
        <div className={"delta " + anx.dir}><div className="label">Anxiety</div><div className="value">{anx.arrow}</div></div>
        <div className={"delta " + dep.dir}><div className="label">Low-mood</div><div className="value">{dep.arrow}</div></div>
      </div>
      <div className="delta-text">{summary}</div>
    </div>
  );
}

function InsightCard({ entries }) {
  const [insight, setInsight] = useState({ text: "", source: "" });
  const [loading, setLoading] = useState(true);
  const recent = useMemo(() => Object.values(entries).sort((a,b)=>a.date.localeCompare(b.date)).slice(-7), [entries]);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    window.kypeClient.getInsight(recent).then(r => { if (!cancelled) { setInsight(r); setLoading(false); } });
    return () => { cancelled = true; };
  }, [recent.length]);

  return (
    <div className="card">
      <h2>A gentle note</h2>
      {loading ? <p><span className="spinner"/> Reflecting…</p> : <p style={{color:"var(--ink)"}}>{insight.text}</p>}
    </div>
  );
}

function HistoryTab({ entries }) {
  const [expanded, setExpanded] = useState(null);
  const sorted = Object.values(entries).sort((a,b)=>b.date.localeCompare(a.date));
  if (sorted.length === 0) return <div className="card"><p>No entries yet. Your check-ins will appear here.</p></div>;

  return (
    <>
      {sorted.map(e => (
        <div key={e.date} className="history-item" onClick={()=>setExpanded(expanded===e.date?null:e.date)}>
          <div className="history-row">
            <div className="history-emoji">{MOOD_EMOJIS[e.mood-1]}</div>
            <div style={{flex:1}}>
              <div className="history-date">{prettyDate(e.date)}</div>
              <div className="history-scores">Anxiety {e.anxiety}/10 · Low-mood {e.depression}/10</div>
            </div>
            <div className="muted">{expanded===e.date?"▲":"▼"}</div>
          </div>
          {expanded === e.date && (
            <div className="history-detail">
              <div className="q">"{e.question || "—"}"</div>
              <div>{e.note ? e.note : <span className="muted">No note that day.</span>}</div>
            </div>
          )}
        </div>
      ))}
    </>
  );
}

function InsightsTab({ entries }) {
  const [range, setRange] = useState(7);
  const series = useMemo(() => {
    const days = [];
    for (let i = range - 1; i >= 0; i--) days.push(daysAgoISO(i));
    return days.map(d => ({ date: d, e: entries[d] }));
  }, [entries, range]);

  return (
    <>
      <div className="chart-range">
        {[7,30].map(r => (<button key={r} className={range===r?"active":""} onClick={()=>setRange(r)}>Last {r} days</button>))}
      </div>
      <ChartCard title="Mood (1–5)"      series={series} accessor={e=>e?e.mood:null}       max={5} color="#b8956a" />
      <ChartCard title="Anxiety (0–10)"  series={series} accessor={e=>e?e.anxiety:null}    max={10} color="#c9bcd6" />
      <ChartCard title="Low-mood (0–10)" series={series} accessor={e=>e?e.depression:null} max={10} color="#a8b89a" />
    </>
  );
}

function ChartCard({ title, series, accessor, max, color }) {
  const w = 440, h = 90, pad = 6;
  const values = series.map(s => accessor(s.e));
  const points = values.map((v,i) => {
    if (v == null) return null;
    const x = pad + (i * (w - pad*2)) / Math.max(1, values.length - 1);
    const y = h - pad - ((v / max) * (h - pad*2));
    return [x,y];
  });
  const path = points.reduce((acc,p)=>{ if (!p) return acc; const cmd = acc === "" ? "M" : "L"; return acc + `${cmd}${p[0].toFixed(1)},${p[1].toFixed(1)} `; }, "");

  return (
    <div className="card">
      <div className="chart-title">{title}</div>
      <div className="chart-wrap">
        <svg className="chart" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
          <line x1={pad} x2={w-pad} y1={h-pad} y2={h-pad} stroke="#ece4d8" strokeWidth="1"/>
          {path && <path d={path.trim()} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}
          {points.map((p,i)=> p && <circle key={i} cx={p[0]} cy={p[1]} r="3" fill={color}/>)}
        </svg>
      </div>
    </div>
  );
}

function SettingsTab({ reminderTime, setReminderTime, notifPermission, onRequestNotif, entries }) {
  function exportJSON() {
    const blob = new Blob([JSON.stringify(entries, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `moodtrace-export-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }
  return (
    <div className="card">
      <h2>Settings</h2>
      <div className="setting-row">
        <label>Daily reminder time</label>
        <input type="time" value={reminderTime} onChange={e=>setReminderTime(e.target.value)} />
      </div>
      <div className="setting-row">
        <label>Notifications</label>
        {notifPermission === "granted" ? <span className="muted">Enabled ✓</span> : <button className="btn ghost" style={{width:"auto",margin:0,padding:"6px 12px"}} onClick={onRequestNotif}>Enable</button>}
      </div>
      <div className="setting-row">
        <label>Export data (JSON)</label>
        <button className="btn ghost" style={{width:"auto",margin:0,padding:"6px 12px"}} onClick={exportJSON}>Export</button>
      </div>
      <p className="muted" style={{marginTop:12}}>
        This prototype uses in-memory state. Real push notifications and cloud sync will be added when the app is ported (Android push, Supabase).
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
